<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Електронний щоденник класу — розклад уроків та домашні завдання">
    <title>Електронний щоденник</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/admin-credentials.js"></script>
</head>

<body>

    <div class="container">
        <header>
            <h1 id="classTitle">📚 Щоденник класу</h1>
            <div class="controls">
                <button id="prevWeek" class="nav-btn">← Попередній</button>
                <span id="dateRange">...</span>
                <button id="nextWeek" class="nav-btn">Наступний →</button>
            </div>
            <div class="header-right">
                <span id="saveIndicator" class="save-indicator hidden">✓ Збережено</span>
                <button id="todayHwBtn" class="today-hw-btn hidden" onclick="openTodayHomework()">📋 Сьогодні
                    задали</button>
                <button id="editorBtn" class="edit-btn">📝 Редактор</button>
                <a href="admin.html" class="admin-link-btn" title="Адміністратор">⚙️<span class="admin-text">
                        Адміністратор</span></a>
            </div>
        </header>

        <!-- Оголошення -->
        <div id="announcementBlock" class="announcement-block hidden"></div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 35%">День / Уроки</th>
                        <th style="width: 65%">Домашнє завдання</th>
                    </tr>
                </thead>
                <tbody id="diaryBody">
                </tbody>
            </table>
        </div>

        <footer id="schoolFooter" class="school-footer"></footer>
    </div>

    <!-- Модальне вікно входу редактора -->
    <div id="loginModal" class="modal hidden">
        <div class="modal-content">
            <h3>📝 Вхід для редактора</h3>
            <input type="password" id="passwordInput" placeholder="Пароль редактора" autocomplete="current-password">
            <div class="modal-buttons">
                <button id="loginConfirmBtn" class="primary-btn">Увійти</button>
                <button id="loginCancelBtn" class="secondary-btn">Скасувати</button>
            </div>
        </div>
    </div>

    <!-- Модальне вікно "Сьогодні задали" -->
    <div id="todayHwModal" class="modal hidden">
        <div class="modal-content today-modal-content">
            <h3>📋 Сьогодні задали</h3>
            <div id="todayHwForm"></div>
            <div class="modal-buttons">
                <button id="todayHwSaveBtn" class="primary-btn" onclick="saveTodayHomework()">💾 Зберегти</button>
                <button class="secondary-btn" onclick="closeTodayHomework()">Скасувати</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
